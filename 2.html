<!DOCTYPE html>
<html>
<head>
    
    <style>
        table {
            border-collapse: collapse; /* 合并单元格边框，使边框更紧凑 */
        }
        
        th, td {
            border: 5px solid black; /* 设置单元格的边框粗细和颜色 */
        }
        
        th {
            border-top: 5px solid rgb(255, 255, 255); /* 设置表头单元格底部边框的粗细和颜色 */
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>表头1</th>
            <th>表头2</th>
        </tr>
        <tr>
            <td>数据1</td>
            <td>数据2</td>
        </tr>
    </table>
</body>
</html>
