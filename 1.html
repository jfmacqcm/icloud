<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-image: url('./jianeng.jpg'); /* 设置背景图片的URL */
            background-size: 300px  200px; /* 让背景图片覆盖整个页面 */
            background-repeat: no-repeat; /* 禁止背景图片重复 */
        }
        table{
        border: 1px solid rgb(255, 255, 255);
        border-collapse: collapse; /* 添加此行以确保边框相邻时不留空隙 */
       }
       td {
            border: 1px solid rgb(255, 255, 255);
            padding: 5px; /* 添加内边距以增加单元格内容与边框之间的距离 */
        }
        th {
            border-top: 12px solid rgb(255, 255, 255); /* 设置表头单元格底部边框的粗细和颜色 */
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>111</td>
        </tr>
        <tr>
            <td>222</td>
        </tr>
        <tr>
            <td>333</td>
        </tr>
    </table>

</body>
</html>
