<!DOCTYPE html>
<html>
<head>
    <title>实线边框表格</title>
    <style>
        table {
            border-collapse: collapse; /* 合并边框 */
            width: 100%;
        }
        th, td {
            border: 1px solid black; /* 设置边框为实线 */
            padding: 8px; /* 设置单元格内边距 */
            text-align: center; /* 文字居中 */
        }
        th {
            background-color: #a31919; /* 设置表头背景色 */
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>表头1</th>
        <th>表头2</th>
        <th>表头3</th>
    </tr>
    <tr>
        <td>数据1</td>
        <td>数据2</td>
        <td>数据3</td>
    </tr>
    <tr>
        <td>数据4</td>
        <td>数据5</td>
        <td>数据6</td>
    </tr>
</table>

</body>
</html>
